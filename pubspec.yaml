name: fitforge
description: "FitForge — Offline Fitness & Nutrition Tracker"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  vibration: ^2.0.0
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
