Categories:
  - Sports & Health

License: Apache-2.0

AuthorName: FitForge Contributors
AuthorEmail: ''

SourceCode: https://github.com/mnkkhan77/fitforge
IssueTracker: https://github.com/mnkkhan77/fitforge/issues
Changelog: https://github.com/mnkkhan77/fitforge/blob/main/CHANGELOG.md
Repo: https://github.com/mnkkhan77/fitforge

AutoName: FitForge

AntiFeatures:
  NonFreeNet:
    en-US: >
      The optional AI Coach feature connects to Groq or OpenAI APIs (user-provided
      key). All other features are fully offline. The AI feature can be ignored
      entirely — the app is complete without it.

Builds:
  - versionName: '2.0.0'
    versionCode: 1
    commit: 376e065b101c1d14bb5d537935813d64c5019647
    output: build/app/outputs/flutter-apk/fitforge-2.0.0-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    build: $$flutter$$/bin/flutter build apk --release

AutoUpdateMode: None
UpdateCheckMode: None
